<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #artplayer {
            width: 100%;
            height: 100%;
        }
        /* 确保视频容器自适应 */
        .art-video-player {
            width: 100% !important;
            height: 100% !important;
        }
        .art-video {
            object-fit: contain !important;
        }
        
        /* 移动端控制栏优化 */
        @media (max-width: 768px) {
            /* 控制栏响应式调整 */
            .art-controls {
                padding: 8px 10px !important;
                height: 48px !important;
                display: flex !important;
                align-items: center !important;
            }
            
            /* 进度条容器调整 - 向上移动更多避免重叠 */
            .art-controls-progress {
                margin: 0 6px !important;
                height: auto !important;
                pointer-events: auto !important;
                position: relative !important;
                top: -12px !important; /* 向上移动更多 */
                flex: 1 !important;
            }
            
            /* 控制栏左右两侧布局 */
            .art-controls-left {
                display: flex !important;
                align-items: center !important;
                gap: 8px !important;
                flex-shrink: 0 !important;
            }
            
            .art-controls-right {
                display: flex !important;
                align-items: center !important;
                gap: 8px !important;
                flex-shrink: 0 !important;
            }
            
            /* 按钮大小调整 */
            .art-control {
                width: 36px !important;
                height: 36px !important;
                min-width: 36px !important;
                pointer-events: auto !important;
                flex-shrink: 0 !important;
            }
            
            /* 播放按钮确保可点击 */
            .art-control-play {
                pointer-events: auto !important;
                z-index: 10 !important;
            }
            
            /* 时间显示调整 - 确保不重叠 */
            .art-control-time {
                font-size: 11px !important;
                min-width: 60px !important;
                white-space: nowrap !important;
                text-align: center !important;
                flex-shrink: 0 !important;
            }
            
            /* 音量控制在移动端隐藏 */
            .art-control-volume {
                display: none !important;
            }
            
            /* 恢复设置按钮 - 用于访问播放速度 */
            .art-control-setting {
                display: flex !important;
                width: 36px !important;
                height: 36px !important;
            }
            
            /* 隐藏独立的播放速度按钮 - 通过设置访问 */
            .art-control-playbackRate {
                display: none !important;
            }
            
            /* 确保画中画按钮显示 */
            .art-control-pip {
                display: flex !important;
                width: 36px !important;
                height: 36px !important;
            }
        }
        
        /* 超小屏幕优化 */
        @media (max-width: 480px) {
            .art-controls {
                padding: 6px 8px !important;
                height: 44px !important;
            }
            
            .art-controls-progress {
                top: -10px !important; /* 超小屏幕进度条向上移动 */
                margin: 0 4px !important;
            }
            
            .art-controls-left,
            .art-controls-right {
                gap: 6px !important;
            }
            
            .art-control {
                width: 32px !important;
                height: 32px !important;
                min-width: 32px !important;
            }
            
            .art-control-time {
                font-size: 10px !important;
                min-width: 50px !important;
            }
            
            .art-control-setting,
            .art-control-pip {
                width: 32px !important;
                height: 32px !important;
            }
        }
        
        /* 进度条优化 - 不破坏原有功能 */
        .art-progress {
            height: 3px !important;
        }
        
        .art-progress-hover {
            height: 3px !important;
        }
        
        .art-progress-dot {
            width: 12px !important;
            height: 12px !important;
        }
        
        /* 移动端进度条优化 - 保持交互功能 */
        @media (max-width: 768px) {
            .art-progress {
                height: 4px !important;
            }
            
            .art-progress-hover {
                height: 4px !important;
            }
            
            .art-progress-dot {
                width: 14px !important;
                height: 14px !important;
            }
            
            /* 隐藏进度条上方的时间提示 */
            .art-progress-tip {
                display: none !important;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <div id="artplayer"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let videoUrl = urlParams.get('url');
        
        if (videoUrl) {
            // 检测视频类型
            const getVideoType = (url) => {
                if (url.includes('.m3u8')) return 'm3u8';
                if (url.includes('.mp4')) return 'mp4';
                if (url.includes('.webm')) return 'webm';
                if (url.includes('.ogg')) return 'ogg';
                return 'auto';
            };
            
            const videoType = getVideoType(videoUrl);
            
            try {
                // 检测是否为移动设备
                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;
                
                var art = new Artplayer({
                    container: '#artplayer',
                    url: videoUrl,
                    type: videoType,
                    customType: {
                        m3u8: function(video, url) {
                            if (Hls.isSupported()) {
                                const hls = new Hls({
                                    debug: false,
                                    enableWorker: true,
                                    lowLatencyMode: true,
                                });
                                hls.loadSource(url);
                                hls.attachMedia(video);
                                
                                hls.on(Hls.Events.ERROR, function (event, data) {
                                    if (data.fatal) {
                                        switch(data.type) {
                                            case Hls.ErrorTypes.NETWORK_ERROR:
                                                hls.startLoad();
                                                break;
                                            case Hls.ErrorTypes.MEDIA_ERROR:
                                                hls.recoverMediaError();
                                                break;
                                            default:
                                                hls.destroy();
                                                break;
                                        }
                                    }
                                });
                            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                                video.src = url;
                            }
                        }
                    },
                    autoSize: false,
                    autoMini: true,
                    aspectRatio: false,
                    setting: true, // 恢复设置按钮，用于访问播放速度
                    fullscreen: true,
                    fullscreenWeb: true,
                    pip: true, // 保留画中画功能
                    playbackRate: true, // 保留播放速度功能
                    autoplay: false,
                    autoPlayback: true,
                    hotkey: true,
                    theme: '#e8a020',
                    lang: 'zh-cn',
                    muted: false,
                    volume: 0.7,
                    contextmenu: isMobile ? [] : [
                        {
                            html: '关于 ArtPlayer',
                            click: function () {
                                window.open('https://artplayer.org');
                            },
                        },
                    ],
                });
                
                // 移动端优化
                if (isMobile) {
                    // 移动端双击全屏
                    art.on('dblclick', () => {
                        art.fullscreen = !art.fullscreen;
                    });
                    
                    // 移动端单击显示/隐藏控制栏 - 但不影响按钮点击
                    let clickTimer = null;
                    art.on('click', (event) => {
                        // 如果点击的是控制栏元素，不处理
                        if (event.target.closest('.art-controls')) {
                            return;
                        }
                        
                        // 延迟处理单击，避免与双击冲突
                        clearTimeout(clickTimer);
                        clickTimer = setTimeout(() => {
                            art.controls = !art.controls;
                        }, 200);
                    });
                    
                    // 双击时清除单击定时器
                    art.on('dblclick', () => {
                        clearTimeout(clickTimer);
                    });
                }
                
                // 视频加载后调整播放器大小
                art.on('ready', () => {
                    const video = art.video;
                    const videoRatio = video.videoWidth / video.videoHeight;
                    
                    // 通知父页面视频比例（如果在 iframe 中）
                    if (window.parent !== window) {
                        window.parent.postMessage({
                            type: 'videoRatio',
                            ratio: videoRatio
                        }, '*');
                    }
                });
                
            } catch (error) {
                document.body.innerHTML = '<div style="color: white; text-align: center; padding: 50px; font-family: sans-serif;"><h2>播放器初始化失败</h2><p>错误: ' + error.message + '</p></div>';
            }
            
        } else {
            document.body.innerHTML = '<div style="color: white; text-align: center; padding: 50px; font-family: sans-serif;"><h2>未提供视频链接</h2><p>请在 URL 中添加 ?url=视频地址</p></div>';
        }
    </script>
</body>
</html>
