<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #artplayer {
            width: 100%;
            height: 100%;
        }
        /* 确保视频容器自适应 */
        .art-video-player {
            width: 100% !important;
            height: 100% !important;
        }
        .art-video {
            object-fit: contain !important;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <div id="artplayer"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let videoUrl = urlParams.get('url');
        
        if (videoUrl) {
            // 检测视频类型
            const getVideoType = (url) => {
                if (url.includes('.m3u8')) return 'm3u8';
                if (url.includes('.mp4')) return 'mp4';
                if (url.includes('.webm')) return 'webm';
                if (url.includes('.ogg')) return 'ogg';
                return 'auto';
            };
            
            const videoType = getVideoType(videoUrl);
            
            try {
                var art = new Artplayer({
                    container: '#artplayer',
                    url: videoUrl,
                    type: videoType,
                    customType: {
                        m3u8: function(video, url) {
                            if (Hls.isSupported()) {
                                const hls = new Hls({
                                    debug: false,
                                    enableWorker: true,
                                    lowLatencyMode: true,
                                });
                                hls.loadSource(url);
                                hls.attachMedia(video);
                                
                                hls.on(Hls.Events.ERROR, function (event, data) {
                                    if (data.fatal) {
                                        switch(data.type) {
                                            case Hls.ErrorTypes.NETWORK_ERROR:
                                                hls.startLoad();
                                                break;
                                            case Hls.ErrorTypes.MEDIA_ERROR:
                                                hls.recoverMediaError();
                                                break;
                                            default:
                                                hls.destroy();
                                                break;
                                        }
                                    }
                                });
                            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                                video.src = url;
                            }
                        }
                    },
                    autoSize: false,
                    autoMini: true,
                    aspectRatio: false,
                    setting: true,
                    fullscreen: true,
                    fullscreenWeb: true,
                    pip: true,
                    playbackRate: true,
                    autoplay: false,
                    autoPlayback: true,
                    hotkey: true,
                    theme: '#e8a020',
                    lang: 'zh-cn',
                    contextmenu: [
                        {
                            html: '关于 ArtPlayer',
                            click: function () {
                                window.open('https://artplayer.org');
                            },
                        },
                    ],
                });
                
                // 视频加载后调整播放器大小
                art.on('ready', () => {
                    const video = art.video;
                    const videoRatio = video.videoWidth / video.videoHeight;
                    
                    // 通知父页面视频比例（如果在 iframe 中）
                    if (window.parent !== window) {
                        window.parent.postMessage({
                            type: 'videoRatio',
                            ratio: videoRatio
                        }, '*');
                    }
                });
                
            } catch (error) {
                document.body.innerHTML = '<div style="color: white; text-align: center; padding: 50px; font-family: sans-serif;"><h2>播放器初始化失败</h2><p>错误: ' + error.message + '</p></div>';
            }
            
        } else {
            document.body.innerHTML = '<div style="color: white; text-align: center; padding: 50px; font-family: sans-serif;"><h2>未提供视频链接</h2><p>请在 URL 中添加 ?url=视频地址</p></div>';
        }
    </script>
</body>
</html>
