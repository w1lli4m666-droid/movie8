baseURL = "https://movie8.win"
languageCode = "zh-CN"
title = "电影吧"

[params]
  description = "电影推荐"
  giscus_repo = "<username>/<repo>"
  giscus_repo_id = "<repo-id>"
  giscus_category = "Announcements"
  giscus_category_id = "<category-id>"

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[markup.goldmark.renderer]
  unsafe = true

# Cloudflare Pages 构建配置说明：
# 构建命令：hugo --minify && npx pagefind --site public
# 输出目录：public
# 环境变量：
#   HUGO_VERSION = "0.128.0"（或更新版本）
#   NODE_VERSION = "18"（用于运行 Pagefind CLI）
