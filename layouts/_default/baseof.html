<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
  {{ $css := resources.Get "css/main.css" }}
  {{ if $css }}
  {{ $css = $css | resources.Minify | resources.Fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}">
  {{ end }}
  {{ range .AlternativeOutputFormats }}
  <link rel="{{ .Rel }}" type="{{ .MediaType.Type }}" href="{{ .Permalink }}" title="{{ $.Site.Title }}">
  {{ end }}
</head>
<body>
  <header>
    <nav>
      <a href="{{ "/" | relURL }}" class="site-title">{{ .Site.Title }}</a>
      <ul>
        <li><a href="{{ "/" | relURL }}">首页</a></li>
        <li><a href="{{ "/tags/" | relURL }}">类型</a></li>
        <li><a href="{{ "/search/" | relURL }}">搜索</a></li>
      </ul>
    </nav>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer>
    <p>&copy; {{ now.Year }} {{ .Site.Title }}. 保留所有权利。</p>
  </footer>
</body>
</html>
