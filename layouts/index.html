{{ define "main" }}
<div class="grid-list">
  {{ $posts := where site.RegularPages "Type" "posts" }}
  {{ if $posts }}
    {{ range $posts }}
    <a href="{{ .Permalink }}" class="grid-card">
      {{ with .Params.cover }}
      <img src="{{ . }}" alt="{{ $.Title }}" class="grid-cover">
      {{ else }}
      <div class="grid-cover grid-cover--placeholder"></div>
      {{ end }}
      <div class="grid-overlay">
        <h2 class="grid-title">{{ .Title }}</h2>
        {{ with .Params.rating }}
        <div class="grid-rating">{{ . }} / 10</div>
        {{ end }}
      </div>
    </a>
    {{ end }}
  {{ else }}
  <div class="no-posts">
    <p>暂无文章</p>
  </div>
  {{ end }}
</div>
{{ end }}
