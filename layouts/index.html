{{ define "main" }}
<section class="grid-list">
  {{ range site.RegularPages.ByDate.Reverse }}
  {{ $post := . }}
  <a href="{{ $post.RelPermalink }}" class="grid-card">
    {{ if $post.Params.cover }}
    <img src="{{ $post.Params.cover }}" alt="{{ $post.Title }}" class="grid-cover">
    {{ else }}
    <div class="grid-cover grid-cover--placeholder"></div>
    {{ end }}
    <div class="grid-overlay">
      <h2 class="grid-title">{{ $post.Title }}</h2>
      {{ with $post.Params.rating }}
      <span class="grid-rating">★ {{ . }}</span>
      {{ end }}
    </div>
  </a>
  {{ else }}
  <p class="no-posts">暂无文章。</p>
  {{ end }}
</section>
{{ end }}
