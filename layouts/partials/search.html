<link href="/pagefind/pagefind-ui.css" rel="stylesheet">
<style>
  .pagefind-ui__result-excerpt { display: none !important; }
  .pagefind-ui__result-excerpt.has-summary { display: block !important; }
</style>
<div id="search"></div>
<script src="/pagefind/pagefind-ui.js"></script>
<script>
  window.addEventListener('load', () => {
    const params = new URLSearchParams(window.location.search);
    const query = params.get('q');

    const ui = new PagefindUI({
      element: "#search",
      showSubResults: false,
      showImages: false,
      excerptLength: 0,
    });

    var observer = new MutationObserver(function() {
      document.querySelectorAll('.pagefind-ui__result:not([data-si])').forEach(function(result) {
        result.setAttribute('data-si', '1');
        var excerptEl = result.querySelector('.pagefind-ui__result-excerpt');
        if (!excerptEl) return;
        var anchor = result.querySelector('.pagefind-ui__result-title a');
        if (!anchor) return;
        var url = anchor.getAttribute('href');
        if (!url) return;
        fetch(url)
          .then(function(r) { return r.text(); })
          .then(function(html) {
            var doc = new DOMParser().parseFromString(html, 'text/html');
            // 读取 data-pagefind-meta 内联语法的值
            var metaEl = doc.querySelector('[data-pagefind-meta^="summary:"]');
            var summary = '';
            if (metaEl) {
              var attr = metaEl.getAttribute('data-pagefind-meta');
              summary = attr.replace(/^summary:/, '').trim();
            }
            if (summary) {
              var max = 200;
              excerptEl.textContent = summary.length > max ? summary.slice(0, max) + '……' : summary;
              excerptEl.classList.add('has-summary');
            }
          })
          .catch(function() {});
      });
    });
    observer.observe(document.getElementById('search'), { childList: true, subtree: true });

    if (query) {
      var decodedQuery = decodeURIComponent(query);
      var checkInterval = setInterval(function() {
        var searchInput = document.querySelector('.pagefind-ui__search-input');
        if (searchInput) {
          clearInterval(checkInterval);
          searchInput.value = decodedQuery;
          searchInput.dispatchEvent(new Event('input', { bubbles: true }));
          searchInput.dispatchEvent(new Event('change', { bubbles: true }));
          setTimeout(function() {
            var btn = document.querySelector('.pagefind-ui__search-input-button');
            if (btn) btn.click();
          }, 50);
        }
      }, 50);
      setTimeout(function() { clearInterval(checkInterval); }, 3000);
    }
  });
</script>
