<link href="/pagefind/pagefind-ui.css" rel="stylesheet">
<style>
  /* 隐藏 Pagefind 默认 excerpt */
  .pagefind-ui__result-excerpt { display: none !important; }
  .pagefind-ui__result-excerpt.has-summary { display: block !important; }
</style>
<div id="search"></div>
<script src="/pagefind/pagefind-ui.js"></script>
<script>
  window.addEventListener('load', () => {
    const params = new URLSearchParams(window.location.search);
    const query = params.get('q');

    const ui = new PagefindUI({
      element: "#search",
      showSubResults: false,
      showImages: false,
      excerptLength: 0,
    });

    var observer = new MutationObserver(function() {
      document.querySelectorAll('.pagefind-ui__result:not([data-si])').forEach(function(result) {
        result.setAttribute('data-si', '1');
        var excerptEl = result.querySelector('.pagefind-ui__result-excerpt');
        if (!excerptEl) return;
        var anchor = result.querySelector('.pagefind-ui__result-title a');
        if (!anchor) return;
        var url = anchor.getAttribute('href');
        if (!url) return;
        fetch(url)
          .then(r => r.text())
          .then(html => {
            var doc = new DOMParser().parseFromString(html, 'text/html');
            var el = doc.querySelector('[data-summary]');
            if (el && el.textContent.trim()) {
              var text = el.textContent.trim();
              var max = 200;
              excerptEl.textContent = text.length > max ? text.slice(0, max) + '……' : text;
              excerptEl.classList.add('has-summary');
            }
          })
          .catch(() => {});
      });
    });
    observer.observe(document.getElementById('search'), { childList: true, subtree: true });

    if (query) {
      const decodedQuery = decodeURIComponent(query);
      const checkInterval = setInterval(() => {
        const searchInput = document.querySelector('.pagefind-ui__search-input');
        if (searchInput) {
          clearInterval(checkInterval);
          searchInput.value = decodedQuery;
          searchInput.dispatchEvent(new Event('input', { bubbles: true }));
          searchInput.dispatchEvent(new Event('change', { bubbles: true }));
          setTimeout(() => {
            const btn = document.querySelector('.pagefind-ui__search-input-button');
            if (btn) btn.click();
          }, 50);
        }
      }, 50);
      setTimeout(() => clearInterval(checkInterval), 3000);
    }
  });
</script>
