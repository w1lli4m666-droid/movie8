{{/*
  视频播放器 - 单窗口 + 集数卡片导航
  支持电影（单源/多源）和电视剧（季/集分层卡片）
*/}}
{{ $videos := .videos }}
{{ $containerId := .containerId | default "auto-video-player" }}

{{ if $videos }}
{{ $data := index $videos 0 }}
<div class="vp-wrapper" id="{{ $containerId }}-root">

  <!-- 播放器主窗口 -->
  <div class="vp-player-box">
    <iframe id="{{ $containerId }}-iframe"
            src=""
            style="width:100%;aspect-ratio:16/9;border:none;display:block;background:#000;"
            allowfullscreen></iframe>
  </div>

  <!-- 视频源选择栏 -->
  <div class="vp-source-bar" id="{{ $containerId }}-source-bar">
    <label for="{{ $containerId }}-source-select">视频源：</label>
    <select id="{{ $containerId }}-source-select"></select>
  </div>

  <!-- 集数导航（电视剧） -->
  <div class="vp-episode-nav" id="{{ $containerId }}-episode-nav"></div>

</div>

<script>
(function() {
  var rootId = '{{ $containerId }}-root';
  var iframeId = '{{ $containerId }}-iframe';
  var sourceBarId = '{{ $containerId }}-source-bar';
  var sourceSelectId = '{{ $containerId }}-source-select';
  var episodeNavId = '{{ $containerId }}-episode-nav';
  var playerBase = '/player.html?url=';

  var data = {{ $data | jsonify | safeJS }};

  // 当前选中的集数据（含 alternatives）
  var currentEpisode = null;

  function setIframeSrc(url) {
    document.getElementById(iframeId).src = playerBase + encodeURIComponent(url);
  }

  function buildSourceSelect(episode) {
    var sel = document.getElementById(sourceSelectId);
    sel.innerHTML = '';
    var sources = [{ name: episode.name || '主源', url: episode.url }];
    if (episode.alternatives) {
      episode.alternatives.forEach(function(a) {
        sources.push({ name: a.name, url: a.url });
      });
    }
    sources.forEach(function(s, i) {
      var opt = document.createElement('option');
      opt.value = s.url;
      opt.textContent = s.name;
      sel.appendChild(opt);
    });
    sel.onchange = function() { setIframeSrc(this.value); };
    // 显示源栏（多源时才有意义，但始终显示方便用户知道当前源）
    document.getElementById(sourceBarId).style.display = sources.length > 0 ? 'flex' : 'none';
  }

  function selectEpisode(episode, cardEl) {
    currentEpisode = episode;
    // 更新 active 卡片（跨所有面板）
    var allCards = document.querySelectorAll('#' + episodeNavId + ' .vp-ep-card');
    allCards.forEach(function(c) { c.classList.remove('active'); });
    if (cardEl) cardEl.classList.add('active');
    // 更新源选择栏
    buildSourceSelect(episode);
    // 加载第一个源
    setIframeSrc(episode.url);
  }

  function buildSeriesNav(seasons) {
    var nav = document.getElementById(episodeNavId);
    nav.innerHTML = '';

    // 季标签行
    var tabsRow = document.createElement('div');
    tabsRow.className = 'vp-season-tabs';

    // 集数面板容器
    var panels = [];

    seasons.forEach(function(season, si) {
      var label = season.season_title || ('第' + season.season_number + '季');

      // 标签
      var tab = document.createElement('div');
      tab.className = 'vp-season-tab' + (si === 0 ? ' active' : '');
      tab.textContent = label;

      // 面板
      var panel = document.createElement('div');
      panel.className = 'vp-season-panel' + (si === 0 ? ' active' : '');

      var grid = document.createElement('div');
      grid.className = 'vp-ep-grid';

      (season.episodes || []).forEach(function(ep) {
        var card = document.createElement('div');
        card.className = 'vp-ep-card';
        var num = document.createElement('span');
        num.className = 'vp-ep-num';
        num.textContent = ep.number;
        card.appendChild(num);
        if (ep.title) {
          var t = document.createElement('span');
          t.className = 'vp-ep-title';
          t.textContent = ep.title;
          card.appendChild(t);
        }
        card.addEventListener('click', function() { selectEpisode(ep, card); });
        grid.appendChild(card);
      });

      panel.appendChild(grid);
      panels.push({ tab: tab, panel: panel });

      // 切换季
      tab.addEventListener('click', function() {
        panels.forEach(function(p) {
          p.tab.classList.remove('active');
          p.panel.classList.remove('active');
        });
        tab.classList.add('active');
        panel.classList.add('active');
      });

      tabsRow.appendChild(tab);
    });

    nav.appendChild(tabsRow);
    panels.forEach(function(p) { nav.appendChild(p.panel); });
  }

  function buildMoviePlayer(d) {
    // 电影：隐藏集数导航，直接加载
    document.getElementById(episodeNavId).style.display = 'none';
    var ep = { name: d.name || '主源', url: d.url, alternatives: d.alternatives };
    buildSourceSelect(ep);
    setIframeSrc(d.url);
  }

  function init() {
    if (!data) return;
    if (data.type === 'series') {
      if (data.seasons && data.seasons.length > 0) {
        buildSeriesNav(data.seasons);
        // 默认选中第一集
        var firstEp = data.seasons[0].episodes && data.seasons[0].episodes[0];
        if (firstEp) {
          var firstCard = document.querySelector('#' + episodeNavId + ' .vp-ep-card');
          selectEpisode(firstEp, firstCard);
        }
      } else if (data.episodes && data.episodes.length > 0) {
        // 兼容无 seasons 的旧格式
        buildSeriesNav([{ season_number: 1, season_title: '第一季', episodes: data.episodes }]);
        var firstEp = data.episodes[0];
        var firstCard = document.querySelector('#' + episodeNavId + ' .vp-ep-card');
        selectEpisode(firstEp, firstCard);
      }
    } else {
      buildMoviePlayer(data);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
{{ end }}
