{{ define "main" }}
<section class="list-page">
  <h1>{{ .Title }}</h1>

  {{ if .Pages }}
  <div class="grid-list">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="grid-card">
      {{ if .Params.cover }}
      <img src="{{ .Params.cover }}" alt="{{ .Title }}" class="grid-cover">
      {{ else }}
      <div class="grid-cover grid-cover--placeholder"></div>
      {{ end }}
      <div class="grid-overlay">
        <h2 class="grid-title">{{ .Title }}</h2>
        {{ with .Params.rating }}
        <span class="grid-rating">★ {{ . }}</span>
        {{ end }}
      </div>
    </a>
    {{ end }}
  </div>
  {{ else }}
  <p class="no-posts">该类型下暂无文章。</p>
  {{ end }}
</section>
{{ end }}
