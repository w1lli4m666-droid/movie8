{{ define "main" }}
<section class="list-page">
  <h1>类型</h1>

  {{ if .Data.Terms }}
  <div class="tag-grid">
    {{ range .Data.Terms.ByCount }}
    <a href="{{ .Page.RelPermalink }}" class="tag-card">
      <div class="tag-card-content">
        <h3 class="tag-card-title">{{ .Page.Title }}</h3>
        <span class="tag-card-count">{{ .Count }} 部</span>
      </div>
    </a>
    {{ end }}
  </div>
  {{ else }}
  <p class="no-posts">暂无类型。</p>
  {{ end }}
</section>
{{ end }}
